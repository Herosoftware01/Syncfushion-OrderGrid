name: Deploy React App to IIS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: [self-hosted, windows, x64]

    steps:

    # 1️⃣ Checkout repo in a separate folder, skip folder cleanup to avoid EPERM
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        path: HF_APP_build
        persist-credentials: false
        clean: false  # avoid deleting locked files

    # 2️⃣ Install dependencies (clean install)
    - name: Install Dependencies
      run: |
        cd HF_APP_build
        npm ci

    # 3️⃣ Build React app
    - name: Build React App
      run: |
        cd HF_APP_build
        npm run build

    # 4️⃣ Copy web.config to build folder
    - name: Copy web.config
      run: copy HF_APP_build\web.config HF_APP_build\dist\web.config

    # 5️⃣ Stop IIS App Pool (Admin / Local System required)
    - name: Stop IIS App Pool
      run: |
        Import-Module WebAdministration
        Stop-WebAppPool -Name "HF_FRONTEND"
      shell: powershell
      continue-on-error: true  # fail-safe if runner not Admin

    # 6️⃣ Deploy build to IIS folder
    - name: Deploy Build
      run: |
        $iisDist = "D:\PRODUCTION_SOFTWEARE\frontend\dist"
        if (Test-Path $iisDist) {
          Remove-Item $iisDist -Recurse -Force -ErrorAction SilentlyContinue
        }
        Copy-Item HF_APP_build\dist $iisDist -Recurse

    # 7️⃣ Start IIS App Pool
    - name: Start IIS App Pool
      run: |
        Import-Module WebAdministration
        Start-WebAppPool -Name "HF_FRONTEND"
      shell: powershell
      continue-on-error: true  # fail-safe