name: Deploy React App to IIS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: [self-hosted, windows, x64]

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install dependencies
      run: npm ci

    - name: Build React app
      run: npm run build

    - name: Copy web.config
      run: copy web.config dist\web.config

    - name: Deploy to IIS folder
      run: xcopy dist "D:\PRODUCTION_SOFTWEARE\frontend\dist" /E /H /C /I /Y

    - name: Restart IIS App Pool
      run: |
        powershell Import-Module WebAdministration
        powershell Restart-WebAppPool -Name "HF_FRONTEND"